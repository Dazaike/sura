<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Status</title>
    <style>
      :root {
        color: #e6e6e6;
        background: transparent;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        font-synthesis: none;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
        --accent: #6c7bff;
        --accent-2: #8a6cff;
        --accent-soft: rgba(108, 123, 255, 0.16);
        --surface: rgba(20, 24, 32, 0.92);
        --secondary: #9aa3b2;
        --track: rgba(255, 255, 255, 0.1);
      }

      @property --progress {
        syntax: "<percentage>";
        inherits: false;
        initial-value: 0%;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
        user-select: none;
      }

      .overlay {
        width: 420px;
        height: 70px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        overflow: hidden;
        white-space: nowrap;
        background:
          linear-gradient(135deg, rgba(108, 123, 255, 0.08), transparent 42%),
          var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 12px;
        contain: layout paint style;
        animation: overlay-in 140ms ease-out both;
        cursor: move;
      }

      .overlay.is-closing {
        animation: overlay-out 150ms ease-in both;
      }

      .spinner {
        width: 22px;
        height: 22px;
        flex: 0 0 22px;
        border: 3px solid rgba(154, 163, 178, 0.22);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 780ms linear infinite;
      }

      .copy {
        min-width: 148px;
        max-width: 198px;
        flex: 1 1 188px;
        overflow: hidden;
        padding-left: 8px;
      }

      .status-text {
        overflow: hidden;
        color: #e6e6e6;
        font-size: 12px;
        font-weight: 700;
        line-height: 14px;
        text-overflow: ellipsis;
      }

      .progress-track {
        position: relative;
        height: 6px;
        min-width: 66px;
        flex: 0 1 88px;
        overflow: hidden;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          var(--accent) 0%,
          var(--accent) var(--progress, 0%),
          var(--track) var(--progress, 0%),
          var(--track) 100%
        );
        transition: --progress 0.28s ease;
      }

      .percent {
        width: 32px;
        flex: 0 0 32px;
        color: var(--secondary);
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .divider {
        width: 1px;
        height: 24px;
        flex: 0 0 1px;
        background: rgba(255, 255, 255, 0.08);
      }

      .window-actions {
        width: 22px;
        height: 46px;
        flex: 0 0 22px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
      }

      .window-button {
        width: 22px;
        height: 20px;
        flex: 0 0 20px;
        display: grid;
        place-items: center;
        padding: 0;
        border: 0;
        border-radius: 6px;
        color: var(--secondary);
        background: transparent;
        font: 400 16px/1 "Segoe UI", system-ui, sans-serif;
        cursor: default;
        -webkit-app-region: no-drag;
        transition:
          color 140ms ease,
          background-color 140ms ease;
      }

      .window-button:hover {
        color: #e6e6e6;
        background: rgba(255, 255, 255, 0.07);
      }

      .window-button:active {
        background: rgba(255, 255, 255, 0.1);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes overlay-in {
        from {
          opacity: 0;
          transform: translateY(4px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes overlay-out {
        from {
          opacity: 1;
          transform: translateY(0);
        }

        to {
          opacity: 0;
          transform: translateY(6px);
        }
      }
    </style>
  </head>
  <body>
    <main class="overlay" data-tauri-drag-region aria-label="Process status">
      <div class="spinner" aria-hidden="true"></div>
      <div class="copy">
        <div class="status-text" id="statusText">Preparing Steam launch...</div>
      </div>
      <div class="progress-track" id="progressTrack" aria-hidden="true"></div>
      <div class="percent" id="percentText">0%</div>
      <div class="divider" aria-hidden="true"></div>
      <div class="window-actions" aria-label="Window controls">
        <button class="window-button" id="closeButton" type="button" aria-label="Close">×</button>
      </div>
    </main>

    <script type="module">
      import { listen } from "@tauri-apps/api/event";
      import { getCurrentWindow } from "@tauri-apps/api/window";

      const currentWindow = getCurrentWindow();
      const statusText = document.getElementById("statusText");
      const progressTrack = document.getElementById("progressTrack");
      const percentText = document.getElementById("percentText");
      const closeButton = document.getElementById("closeButton");
      const overlay = document.querySelector(".overlay");
      let closeTimer = null;
      let hasShownWindow = false;
      let isClosing = false;

      const clampPercent = (value) => {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) {
          return 0;
        }

        return Math.min(100, Math.max(0, Math.round(numeric)));
      };

      const getDisplayState = (status, percent) => {
        const rawStatus = typeof status === "string" ? status.trim() : "";
        const normalized = rawStatus.toLowerCase();

        if (normalized.includes("preparing")) {
          return ["Starting"];
        }
        if (normalized.includes("starting")) {
          return ["Getting Content..."];
        }
        if (normalized.includes("steam is already running")) {
          return ["Steam Detected"];
        }
        if (normalized.includes("closing")) {
          return ["Stopping Steam"];
        }
        if (normalized.includes("no steam")) {
          return ["Steam Idle"];
        }
        if (normalized.includes("switching back")) {
          return ["Restoring Default Account"];
        }
        if (normalized.includes("switching steam account")) {
          return ["Switching Account"];
        }
        if (normalized.includes("switching account")) {
          return ["Awaiting Account Sync"];
        }
        if (normalized.includes("cleaning")) {
          return ["Cleaning Extra Processes"];
        }
        if (normalized.includes("watching launching window")) {
          return ["Waiting For Launch"];
        }
        if (normalized.includes("launching window detected")) {
          return ["Launching..."];
        }
        if (normalized.includes("launching window closed")) {
          return ["Success"];
        }
        if (normalized.includes("launching steam game")) {
          return ["Awaiting..."];
        }
        if (normalized.includes("waiting for launcher")) {
          return ["Starting"];
        }
        if (normalized.includes("launching game")) {
          return ["Launching..."];
        }
        if (normalized.includes("waiting for game window")) {
          return ["Waiting For Launch"];
        }
        if (normalized.includes("game window detected")) {
          return ["Success"];
        }
        if (normalized.includes("launch command sent")) {
          return ["Loading..."];
        }
        if (normalized.includes("window monitor timed out")) {
          return ["Launch Timed Out"];
        }
        if (normalized.includes("close flow complete")) {
          return ["All Done!"];
        }
        if (normalized.includes("launching steam")) {
          return ["Starting Steam"];
        }
        if (normalized.includes("steam launch command sent")) {
          return ["Steam Running"];
        }
        if (normalized.includes("preview complete")) {
          return ["Preview Complete"];
        }
        if (normalized.includes("usage")) {
          return ["Invalid Command Arguments"];
        }
        if (percent >= 100) {
          return ["All Done!"];
        }

        return [cleanMainStatus(rawStatus) || "Loading..."];
      };

      const cleanMainStatus = (status) =>
        typeof status === "string" ? status.replace(/\.{1,3}$/u, "") : "";

      const setProgress = ({ status, percent }) => {
        const nextPercent = clampPercent(percent);
        const rawStatus =
          typeof status === "string" && status.trim() ? status.trim() : statusText.textContent;
        const [nextStatus] = getDisplayState(rawStatus, nextPercent);

        statusText.textContent = nextStatus;

        progressTrack.style.setProperty("--progress", `${nextPercent}%`);
        percentText.textContent = `${nextPercent}%`;

        if (!hasShownWindow) {
          hasShownWindow = true;
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              currentWindow.show();
            });
          });
        }

        if (closeTimer) {
          clearTimeout(closeTimer);
          closeTimer = null;
        }

        if (nextPercent >= 100) {
          closeTimer = window.setTimeout(() => {
            closeWithAnimation();
          }, 800);
        }
      };

      const closeWithAnimation = () => {
        if (isClosing) {
          return;
        }

        isClosing = true;
        overlay.classList.add("is-closing");
        window.setTimeout(() => {
          currentWindow.close();
        }, 160);
      };

      closeButton.addEventListener("click", () => {
        closeWithAnimation();
      });

      await listen("progress", (event) => {
        setProgress(event.payload ?? {});
      });
    </script>
  </body>
</html>
